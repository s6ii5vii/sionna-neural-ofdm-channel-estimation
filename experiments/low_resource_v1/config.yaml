experiment:
  name: low_resource_v1_ls
  description: First constrained profile using fewer pilots and samples.
  snr_db: [-5, 0, 5, 10, 15]
  num_samples: 500
  num_pilots: 64
  pilot_density: 0.25
  dataset_size_target: 5000
  model_parameter_target: 50000
  random_seed: 42

training:
  dataset_path: data/channel_estimation_dataset.npz
  hidden_units: 64
  dropout_rate: 0.0
  epochs: 10
  batch_size: 64
  checkpoint_path: results/checkpoints/low_resource_v1.keras

output:
  figures_dir: results/figures
  tables_dir: results/tables
